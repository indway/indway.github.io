<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>indway — Lab</title>
    <script type="text/javascript">
      // 404 redirect for clean URLs on GitHub Pages
      (function() {
        var path = window.location.pathname;
        var parts = path.split('/');
        
        // If it's a diary sub-path
        if (parts.includes('diary') && parts[parts.length - 1] !== 'index.html' && parts[parts.length - 1] !== '') {
          var slug = parts[parts.length - 1];
          // Redirect to /diary/?p=slug
          window.location.replace('/diary/?p=' + slug);
        } else {
          // Fallback to home for other 404s
          window.location.replace('/');
        }
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
