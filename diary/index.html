<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diary — indway</title>
    <link rel="icon" href="../assets/favicon.svg" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap");

      :root {
        --bg: #ffffff;
        --fg: #0c0c0c;
        --muted: #666666;
        --border: #f0f0f0;
        --font-mono: "JetBrains Mono", monospace;
        --font-sans: "Inter", -apple-system, blinkmacsystemfont, sans-serif;
        --font-serif: "Lora", georgia, serif;
      }

      [data-theme="dark"] {
        --bg: #0c0c0c;
        --fg: #f5f5f5;
        --muted: #888888;
        --border: #1a1a1a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font-mono);
        font-size: 14px;
        line-height: 1.6;
        transition:
          background 0.3s,
          color 0.3s;
        overflow-x: hidden;
      }

      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
      }

      /* ── TOPBAR ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 40px;
      }
      .topbar-logo {
        font-weight: 700;
        text-decoration: none;
        color: var(--fg);
        font-size: 16px;
      }
      .topbar-actions {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .btn-icon {
        background: none;
        border: none;
        color: var(--fg);
        cursor: pointer;
        font-size: 18px;
        padding: 8px;
        border-radius: 4px;
      }
      .btn-icon:hover {
        background: var(--border);
      }

      /* ── HERO / HEADER ── */
      .hero-pre {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
      }
      .hero-name {
        font-size: 24px;
        font-weight: 700;
        color: var(--fg);
        margin-bottom: 24px;
      }

      /* ── DIARY LIST ── */
      .diary-list {
        list-style: none;
        margin-top: 40px;
      }
      .diary-item {
        padding: 24px 0;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 24px;
        transition: all 0.2s;
        opacity: 0;
        transform: translateY(10px);
      }
      .diary-item.in {
        opacity: 1;
        transform: translateY(0);
      }
      .diary-item:hover {
        background: var(--border);
        padding-left: 12px;
        padding-right: 12px;
        margin-left: -12px;
        margin-right: -12px;
        border-radius: 4px;
      }

      .diary-date {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding-top: 6px;
      }
      .diary-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--fg);
        margin-bottom: 8px;
        display: block;
      }
      .diary-excerpt {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }

      /* ── CONTENT VIEW (Medium Style) ── */
      #content-view {
        display: none;
        padding-bottom: 150px;
      }
      .entry-header {
        margin-top: 60px;
        margin-bottom: 60px;
        text-align: center;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
      }
      .entry-title {
        font-family: var(--font-sans);
        font-size: 3.2rem;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: var(--fg);
        margin-top: 12px;
        margin-bottom: 16px;
      }
      .entry-meta {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .prose {
        font-family: var(--font-serif);
        font-size: 20px;
        line-height: 1.75;
        color: var(--fg);
        max-width: 680px;
        margin: 0 auto;
        word-wrap: break-word;
      }
      .prose p {
        margin-bottom: 1.75em;
        opacity: 0.92;
      }
      .prose h2 {
        font-family: var(--font-sans);
        font-size: 26px;
        font-weight: 700;
        margin: 2em 0 1em 0;
        color: var(--fg);
      }
      .prose h3 {
        font-family: var(--font-sans);
        font-size: 22px;
        font-weight: 700;
        margin: 1.5em 0 0.5em 0;
        color: var(--fg);
      }
      .prose hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 3em 0;
      }
      .prose blockquote {
        border-left: 3px solid var(--fg);
        padding-left: 24px;
        color: var(--muted);
        font-style: italic;
        margin: 2em 0;
        font-size: 1.1em;
      }
      .prose code {
        background: var(--border);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.85em;
        font-family: var(--font-mono);
      }
      .prose pre {
        background: var(--border);
        padding: 24px;
        border-radius: 12px;
        overflow-x: auto;
        margin-bottom: 2em;
        font-size: 14px;
      }
      .prose img {
        max-width: 100%;
        border-radius: 4px;
        margin: 2em 0;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        text-decoration: none;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 40px;
        transition: color 0.2s;
      }
      .back-btn:hover {
        color: var(--fg);
      }

      footer {
        margin-top: 80px;
        padding: 40px 0;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      @media (max-width: 600px) {
        .diary-item {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .hero-name {
          font-size: 20px;
        }
        .entry-title {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div
        class="wrap"
        style="
          width: 100%;
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <a href="/" class="topbar-logo">indway</a>
        <div class="topbar-actions">
          <button
            class="btn-icon"
            id="themeBtn"
            title="Toggle Theme"
            style="font-size: 15px; color: var(--muted)"
          >
            ☀️
          </button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <header id="main-header">
        <div class="hero-pre">indway@lab ~/diary %</div>
        <div class="hero-name">Diary Entries</div>
      </header>

      <section id="list-view">
        <ul class="diary-list" id="diary-list">
          <!-- Data will be injected here -->
        </ul>
      </section>

      <section id="content-view">
        <a href="#" onclick="showList(event)" class="back-btn"
          >← back to list</a
        >
        <article>
          <header class="entry-header">
            <div class="entry-meta">
              <span id="entry-date"></span>
              <span>•</span>
              <span id="entry-read-time"></span>
            </div>
            <h1 id="entry-title" class="entry-title"></h1>
            <div
              id="entry-tags"
              style="
                display: flex;
                justify-content: center;
                gap: 8px;
                margin-top: 16px;
              "
            ></div>
          </header>
          <div id="entry-body" class="prose"></div>
        </article>
      </section>

      <footer>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>&copy; 2026 indway — Catatan Perjalanan Hidup.</div>
          <a href="/feed.xml" target="_blank" style="color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; font-size: 11px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"></path><path d="M4 4a16 16 0 0 1 16 16"></path><circle cx="5" cy="19" r="1"></circle></svg>
            RSS Feed
          </a>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      let diaryData = [];

      // --- THEME LOGIC ---
      function getAutoTheme() {
        const hour = new Date().getHours();
        return hour >= 6 && hour < 18 ? "light" : "dark";
      }

      function applyTheme(mode) {
        const isDark = mode === "dark";
        document.documentElement.setAttribute(
          "data-theme",
          isDark ? "dark" : "",
        );
        const btn = document.getElementById("themeBtn");
        if (btn) btn.textContent = isDark ? "🌙" : "☀️";
      }

      // Initialize theme
      const savedTheme = localStorage.getItem("theme") || getAutoTheme();
      applyTheme(savedTheme);

      document.getElementById("themeBtn").addEventListener("click", () => {
        const current =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "light"
            : "dark";
        localStorage.setItem("theme", current);
        applyTheme(current);
      });

      // --- CORE LOGIC ---
      async function init() {
        try {
          const response = await fetch("../scripts/diary.json");
          const data = await response.json();
          // Sort by date descending
          diaryData = data.sort((a, b) => new Date(b.date) - new Date(a.date));
          handleRoute();
        } catch (err) {
          console.error("Gagal memuat diary:", err);
          document.getElementById("diary-list").innerHTML =
            "Maaf, gagal memuat catatan.";
        }
      }

      function handleRoute() {
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);
        
        // Priority 1: Query param 'p' (from 404 redirect)
        // Priority 2: Direct path slug
        const slug = params.get('p') || path
          .split("/")
          .filter((p) => p.length > 0)
          .pop();

        if (slug && slug !== "diary" && slug !== "index.html") {
          const entry = diaryData.find((d) => d.slug === slug);
          if (entry) {
            showEntry(entry);
            return;
          }
        }
        renderList();
      }

      function renderList() {
        document.getElementById("list-view").style.display = "block";
        document.getElementById("content-view").style.display = "none";
        document.getElementById("main-header").style.display = "block";

        const listEl = document.getElementById("diary-list");
        listEl.innerHTML = diaryData
          .map(
            (entry) => `
                <li class="diary-item" onclick="navigate('${entry.slug}')">
                    <div class="diary-date">${formatDate(entry.date)}</div>
                    <div>
                        <span class="diary-title">${entry.title}</span>
                        <p class="diary-excerpt">${entry.excerpt}</p>
                    </div>
                </li>
            `,
          )
          .join("");

        // Animation
        setTimeout(() => {
          const items = document.querySelectorAll(".diary-item");
          items.forEach((it, i) => {
            setTimeout(() => it.classList.add("in"), i * 60);
          });
        }, 50);
      }

      async function showEntry(entry) {
        document.getElementById("list-view").style.display = "none";
        document.getElementById("main-header").style.display = "none";
        document.getElementById("content-view").style.display = "block";

        document.getElementById("entry-date").textContent = formatDate(
          entry.date,
        );
        document.getElementById("entry-title").textContent = entry.title;
        document.getElementById("entry-body").innerHTML =
          "<p><em>Sedang memuat tulisan...</em></p>";
        document.getElementById("entry-tags").innerHTML = (entry.tags || [])
          .map(
            (t) =>
              `<span style="font-size: 11px; padding: 4px 10px; background: var(--border); border-radius: 20px; color: var(--muted);">${t}</span>`,
          )
          .join("");

        try {
          const response = await fetch(`../diary/${entry.slug}.md`);
          const rawMarkdown = await response.text();
          const cleanMarkdown = rawMarkdown
            .replace(/^---[\s\S]*?---\n?/, "")
            .trim();

          // Calculate read time
          const words = cleanMarkdown.split(/\s+/).length;
          const readTime = Math.ceil(words / 200);
          document.getElementById("entry-read-time").textContent =
            `${readTime} min read`;

          document.getElementById("entry-body").innerHTML =
            marked.parse(cleanMarkdown);
        } catch (err) {
          document.getElementById("entry-body").innerHTML =
            "Maaf, gagal memuat isi diary.";
        }

        window.scrollTo(0, 0);
      }

      function navigate(slug) {
        window.history.pushState({}, "", `/diary/${slug}`);
        handleRoute();
      }

      function showList(e) {
        if (e) e.preventDefault();
        window.history.pushState({}, "", "/diary/");
        handleRoute();
      }

      function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleDateString("id-ID", {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      }

      window.addEventListener("popstate", handleRoute);
      init();
    </script>
  </body>
</html>
