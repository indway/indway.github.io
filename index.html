<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta

    />

    <!-- Open Graph -->
    <meta property="og:title" content="indway — AI-driven Solution Architect" />
    <meta property="og:description" content="AI-driven Solution Architect" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://indway.github.io" />

      property="og:image"
      content="https://indway.github.io/assets/preview.svg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="indway — tools from the lab" />
    <meta
      name="twitter:description"
      content="tools & produk digital dari eksperimen nyata. build useful things."
    />

      name="twitter:image"
      content="https://indway.github.io/assets/preview.svg"
    />

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.svg" />

    <!-- Theme -->
    <meta name="theme-color" id="theme-meta" content="#ffffff" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap");

      :root {
        --bg: #fff;
        --fg: #111;
        --muted: #999;
        --border: #e8e8e8;
        --hover-bg: #f5f5f5;
        --font: "JetBrains Mono", monospace;
      }
      [data-theme="dark"] {
        --bg: #0c0c0c;
        --fg: #dedede;
        --muted: #484848;
        --border: #1e1e1e;
        --hover-bg: #141414;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--font);
        font-size: 20px;
        line-height: 1.85;
        transition:
          background 0.35s,
          color 0.35s;
        overflow-x: hidden;
      }

      /* ── TOPBAR ── */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 300;
        display: flex;
        align-items: center;
        padding: 0 56px;
        height: 60px;
        background: var(--bg);
        border-bottom: 1px solid transparent;
        transition:
          border-color 0.3s,
          background 0.35s;
      }
      .topbar.scrolled {
        border-color: var(--border);
      }

      .topbar-logo {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-right: auto;
        opacity: 0;
        transform: translateX(-8px);
        transition:
          opacity 0.3s,
          transform 0.3s;
        pointer-events: none;
      }
      .topbar-logo.show {
        opacity: 1;
        transform: none;
        pointer-events: auto;
      }
      .topbar-cursor {
        display: inline-block;
        width: 2px;
        height: 0.8em;
        background: var(--fg);
        vertical-align: middle;
        margin-left: 2px;
        animation: blink 1s step-end infinite;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      /* ── minimal controls ── */
      .ctrl-icon {
        background: none;
        border: none;
        color: var(--muted);
        font-family: var(--font);
        font-size: 15px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 2px;
        transition:
          color 0.2s,
          background 0.2s;
        padding: 0;
        flex-shrink: 0;
      }
      .ctrl-icon:hover {
        color: var(--fg);
        background: var(--hover-bg);
      }

      /* ── lang picker ── */
      .lang-picker {
        position: relative;
      }
      .lang-current {
        background: none;
        border: none;
        color: var(--muted);
        font-family: var(--font);
        font-size: 11px;
        letter-spacing: 0.1em;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 2px;
        transition:
          color 0.2s,
          background 0.2s;
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .lang-current:hover {
        color: var(--fg);
        background: var(--hover-bg);
      }
      .lang-current svg {
        width: 9px;
        height: 9px;
        opacity: 0.5;
        transition: transform 0.2s;
      }
      .lang-picker.open .lang-current svg {
        transform: rotate(180deg);
      }
      .lang-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 3px;
        overflow: hidden;
        display: none;
        flex-direction: column;
        min-width: 80px;
        z-index: 400;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      .lang-picker.open .lang-dropdown {
        display: flex;
      }
      .lang-opt {
        background: none;
        border: none;
        font-family: var(--font);
        font-size: 11px;
        letter-spacing: 0.08em;
        color: var(--muted);
        padding: 8px 14px;
        text-align: left;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .lang-opt:hover {
        background: var(--hover-bg);
        color: var(--fg);
      }
      .lang-opt.active {
        color: var(--fg);
        font-weight: 700;
      }
      .lang-opt .lang-flag {
        font-size: 13px;
        line-height: 1;
      }

      /* ── WRAP full width with padding ── */
      .wrap {
        padding: 0 56px;
      }

      @media (max-width: 700px) {
        .topbar {
          padding: 0 22px;
          height: 52px;
        }
        .wrap {
          padding: 0 22px;
        }
      }

      /* ── SECTIONS ── */
      section {
        padding: 110px 0;
        border-bottom: 1px solid var(--border);
      }
      section:last-of-type {
        border-bottom: none;
      }

      /* ── HERO ── */
      .hero {
        padding-top: 150px;
        padding-bottom: 110px;
      }

      .hero-pre {
        font-size: 15px;
        color: var(--muted);
        letter-spacing: 0.1em;
        margin-bottom: 32px;
        opacity: 0;
        animation: up 0.5s ease forwards 0.05s;
      }

      .hero-name {
        font-size: clamp(88px, 12vw, 160px);
        font-weight: 700;
        letter-spacing: -0.045em;
        line-height: 0.95;
        margin-bottom: 28px;
        opacity: 0;
        animation: up 0.55s ease forwards 0.15s;
      }
      .hero-cursor {
        display: inline-block;
        width: 0.065em;
        height: 0.82em;
        background: var(--fg);
        vertical-align: middle;
        margin-left: 4px;
        animation: blink 1s step-end infinite;
      }

      .hero-tagline {
        font-size: clamp(20px, 2.5vw, 34px);
        color: var(--muted);
        font-weight: 300;
        opacity: 0;
        animation: up 0.55s ease forwards 0.28s;
      }

      .hero-body {
        margin-top: 56px;
        font-size: clamp(17px, 1.6vw, 22px);
        opacity: 0;
        animation: up 0.55s ease forwards 0.42s;
        line-height: 2.1;
      }
      .hero-body a {
        color: var(--fg);
        text-underline-offset: 5px;
        text-decoration-color: var(--border);
        transition: text-decoration-color 0.2s;
      }
      .hero-body a:hover {
        text-decoration-color: var(--fg);
      }

      .hero-rate {
        font-size: clamp(14px, 1.1vw, 17px);
        color: var(--muted);
        margin-top: 8px;
      }
      .hero-rate .amount {
        color: var(--fg);
        font-weight: 700;
      }

      /* ── SECTION LABEL ── */
      .sec-label {
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 44px;
      }

      /* ── PRODUCT LIST with showcase ── */
      .plist-wrap {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 0 48px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .plist-wrap {
          grid-template-columns: 1fr;
        }
        .showcase-panel {
          display: none;
        }
      }

      .plist {
        list-style: none;
      }

      .plist li {
        display: flex;
        align-items: baseline;
        gap: clamp(14px, 2vw, 32px);
        padding: clamp(18px, 2vw, 26px) 0;
        border-bottom: 1px solid var(--border);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.45s,
          transform 0.45s;
        cursor: pointer;
      }
      .plist li:first-child {
        border-top: 1px solid var(--border);
      }
      .plist li.in {
        opacity: 1;
        transform: none;
      }
      .plist li:hover .pname {
        opacity: 0.25;
      }
      .plist li:hover .pdesc {
        color: var(--fg);
      }
      .plist li.active .pname {
        opacity: 0.25;
      }

      .pname {
        font-size: clamp(30px, 4.5vw, 60px);
        font-weight: 700;
        letter-spacing: -0.025em;
        line-height: 1.1;
        flex-shrink: 0;
        transition: opacity 0.2s;
      }
      .pname a {
        color: inherit;
        text-decoration: none;
      }

      .pdesc {
        font-size: clamp(14px, 1.3vw, 18px);
        color: var(--muted);
        transition: color 0.2s;
        line-height: 1.5;
      }
      .pdesc a {
        color: inherit;
      }

      /* ── SHOWCASE PANEL ── */
      .showcase-panel {
        position: sticky;
        top: 80px;
        height: 300px;
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        background: var(--hover-bg);
      }

      .showcase-slot {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.35s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .showcase-slot.active {
        opacity: 1;
      }
      .showcase-slot.default {
        opacity: 1;
      }

      .showcase-slot video,
      .showcase-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .showcase-default-text {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-align: center;
        padding: 20px;
      }

      /* ── WEB CARDS ── */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border: 1px solid var(--border);
      }
      @media (max-width: 700px) {
        .cards-grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        padding: clamp(24px, 3vw, 44px);
        border-right: 1px solid var(--border);
        color: var(--fg);
        display: block;
        cursor: pointer;
        opacity: 0;
        transform: translateY(8px);
        transition:
          background 0.2s,
          opacity 0.45s,
          transform 0.45s;
      }
      .card:last-child {
        border-right: none;
      }
      .card.in {
        opacity: 1;
        transform: none;
      }
      .card:hover {
        background: var(--hover-bg);
      }

      @media (max-width: 700px) {
        .card {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
        .card:last-child {
          border-bottom: none;
        }
      }

      .card-name {
        font-size: clamp(20px, 2.5vw, 32px);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
        line-height: 1.2;
      }
      .card-desc {
        font-size: clamp(14px, 1.2vw, 17px);
        color: var(--muted);
        line-height: 1.6;
      }

      .card-subs {
        margin-top: 20px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .sub-link {
        text-decoration: none;
        display: block;
        color: var(--muted);
        transition: color 0.2s;
      }
      .sub-link:hover {
        color: var(--fg);
      }
      .sub-link::before {
        content: "↳ ";
      }
      .sub-link-name {
        font-size: clamp(14px, 1.2vw, 17px);
        font-weight: 700;
      }
      .sub-link-desc {
        font-size: clamp(12px, 1vw, 14px);
        display: block;
        margin-left: 18px;
        line-height: 1.4;
      }

      .desktop-links {
        margin-top: 24px;
        font-size: clamp(14px, 1.2vw, 17px);
        color: var(--muted);
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 0.4s,
          transform 0.4s;
      }
      .desktop-links.in {
        opacity: 1;
        transform: none;
      }
      .desktop-links a {
        color: var(--fg);
        text-underline-offset: 4px;
        text-decoration-color: var(--border);
        transition: text-decoration-color 0.2s;
      }
      .desktop-links a:hover {
        text-decoration-color: var(--fg);
      }

      /* ── SOCIALS ── */
      .socials {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .social-pill {
        font-size: clamp(14px, 1.2vw, 17px);
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: clamp(9px, 1vw, 13px) clamp(18px, 2vw, 28px);
        border-radius: 2px;
        opacity: 0;
        transform: translateY(6px);
        transition:
          all 0.2s,
          opacity 0.4s,
          transform 0.4s;
      }
      .social-pill.in {
        opacity: 1;
        transform: none;
      }
      .social-pill:hover {
        color: var(--bg);
        background: var(--fg);
        border-color: var(--fg);
      }

      .footer-note {
        margin-top: 56px;
        font-size: clamp(13px, 1vw, 15px);
        color: var(--muted);
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 0.4s,
          transform 0.4s;
      }
      .footer-note.in {
        opacity: 1;
        transform: none;
      }

      @keyframes up {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      @media (max-width: 768px) {
        .plist li {
          display: flex;
          flex-direction: column;
          width: 100%;
          margin-bottom: 1rem;
        }
        .plist .pname,
        .plist .pdesc {
          width: 100%;
        }
        .section {
          padding: 60px 0;
        }
        .sub-link-desc {
          white-space: normal;
          line-height: 1.5;
        }
      }

      /* ── MODAL ── */
      .modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transform: translateY(20px);
        transition:
          opacity 0.28s ease,
          transform 0.28s ease;
        overflow: hidden;
      }
      .modal.open {
        opacity: 1;
        pointer-events: auto;
        transform: none;
      }
      .modal-close {
        position: fixed;
        top: 14px;
        right: 20px;
        z-index: 1010;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: var(--font);
        font-size: 18px;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 2px;
        line-height: 1;
        transition: all 0.2s;
      }
      .modal-close:hover {
        color: var(--fg);
        border-color: var(--fg);
      }
      .modal-media {
        width: 100%;
        height: 46vh;
        flex-shrink: 0;
        overflow: hidden;
        background: var(--hover-bg);
      }
      .modal-media img,
      .modal-media video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .modal-media[hidden] {
        display: none;
      }
      #modalScrollBody {
        overflow-y: auto;
        flex: 1;
      }
      .modal-body {
        padding: 52px 56px;
        max-width: 820px;
      }
      @media (max-width: 700px) {
        .modal-media {
          height: 36vh;
        }
        .modal-body {
          padding: 32px 22px;
        }
      }
      .modal-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .modal-category {
        font-size: 11px;
        letter-spacing: 0.12em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .modal-status {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 2px 8px;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 2px;
      }
      .modal-status[data-s="active"] {
        color: #5a9e6b;
        border-color: #5a9e6b44;
      }
      .modal-status[data-s="wip"] {
        color: #c49a1a;
        border-color: #c49a1a44;
      }
      .modal-status[data-s="archived"] {
        opacity: 0.4;
      }
      .modal-name {
        font-size: clamp(36px, 7vw, 68px);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 18px;
      }
      .modal-desc {
        font-size: clamp(15px, 1.4vw, 18px);
        color: var(--muted);
        margin-bottom: 16px;
        line-height: 1.6;
      }
      .modal-detail {
        font-size: clamp(14px, 1.2vw, 17px);
        line-height: 2;
        margin-bottom: 28px;
        opacity: 0.85;
      }
      .modal-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 32px;
      }
      .modal-tag {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 3px 10px;
        border-radius: 2px;
      }
      .modal-cta {
        display: inline-block;
        font-size: 13px;
        letter-spacing: 0.07em;
        font-family: var(--font);
        color: var(--bg);
        background: var(--fg);
        padding: 11px 28px;
        text-decoration: none;
        border-radius: 2px;
        transition: opacity 0.2s;
      }
      .modal-cta:hover {
        opacity: 0.75;
      }
      .modal-cta[hidden] {
        display: none;
      }
      .modal-subs {
        margin-top: 28px;
        padding-top: 28px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
      }
      .modal-subs[hidden] {
        display: none;
      }
    </style>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="283cd77a-4669-4305-a1d7-3913dacfcc47"></script>
    
  </head>
  <body>
    <div class="topbar" id="topbar">
      <div class="topbar-logo" id="topbar-logo">
        indway<span class="topbar-cursor"></span>
      </div>
      <div class="topbar-right">
        <!-- theme toggle -->
        <button
          class="ctrl-icon"
          id="themeBtn"
          title="toggle theme"
          aria-label="toggle theme"
        >
          ☀
        </button>
        <!-- lang picker -->
        <div class="lang-picker" id="langPicker">
          <button
            class="lang-current"
            id="langCurrent"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            <span id="langLabel">ID</span>
            <svg
              viewBox="0 0 10 6"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M1 1l4 4 4-4" />
            </svg>
          </button>
          <div class="lang-dropdown" role="listbox">
            <button class="lang-opt active" data-lang="id" role="option">
              <span class="lang-flag">🇮🇩</span> ID
            </button>
            <button class="lang-opt" data-lang="en" role="option">
              <span class="lang-flag">🇬🇧</span> EN
            </button>
            <button class="lang-opt" data-lang="ms" role="option">
              <span class="lang-flag">🇲🇾</span> MY
            </button>
            <button class="lang-opt" data-lang="ar" role="option">
              <span class="lang-flag">🇸🇦</span> AR
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="wrap">
      <!-- HERO -->
      <section class="hero" id="hero-section">
        <div class="hero-pre">indway@lab ~ %</div>
        <div class="hero-name">indway<span class="hero-cursor"></span></div>
        <div class="hero-tagline" data-i18n="tagline"></div>
        <div class="hero-body">
          <span data-i18n="greeting"></span> <strong>indway</strong>
          <span data-i18n="here"></span><br />
          <span data-i18n="contact_pre"></span>
          <a href="mailto:indway@duck.com">indway@duck.com</a><br />
          <div class="hero-rate" id="hero-rate"></div>
        </div>
      </section>

      <!-- PRODUK -->
      <section>
        <div class="sec-label" data-i18n="sec_products"></div>
        <div class="plist-wrap">
          <ul class="plist" id="list-produk"></ul>
          <div class="showcase-panel" id="showcase-panel">
            <div class="showcase-slot default" id="showcase-default">
              <div
                class="showcase-default-text"
                data-i18n="showcase_hint"
              ></div>
            </div>
          </div>
        </div>
      </section>

      <!-- WEB -->
      <section>
        <div class="sec-label" data-i18n="sec_web"></div>
        <div class="cards-grid" id="web-cards"></div>
        <div class="desktop-links" id="desktop-links">
          <span data-i18n="also_see"></span> →
          <a href="https://kodekeras.my.id" target="_blank">kodekeras.my.id</a>
          ·
          <a
            href="https://kodekeras.my.id/mobile"
            target="_blank"
            data-i18n="mobile_ver"
          ></a>
        </div>
      </section>

      <!-- LAINNYA -->
      <section>
        <div class="sec-label" data-i18n="sec_side"></div>
        <ul class="plist" id="list-side"></ul>
        <div
          class="sec-label"
          style="margin-top: 80px"
          data-i18n="sec_themes"
        ></div>
        <ul class="plist" id="list-themes"></ul>
        <div
          class="sec-label"
          style="margin-top: 80px"
          data-i18n="sec_cyber"
        ></div>
        <ul class="plist" id="list-cyber"></ul>
      </section>

      <!-- FOOTER -->
      <section>
        <div class="sec-label" data-i18n="sec_find"></div>
        <div class="socials" id="socials"></div>
        <div class="footer-note" id="footer-note">
          indway · build useful things.
        </div>
      </section>
    </div>

    <!-- ═══════════════ MODAL ═══════════════ -->
    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="close">×</button>
      <div class="modal-media" id="modalMedia"></div>
      <div id="modalScrollBody">
        <div class="modal-body">
          <div class="modal-meta">
            <span class="modal-category" id="modalCategory"></span>
            <span class="modal-status" id="modalStatus"></span>
          </div>
          <h2 class="modal-name" id="modalName"></h2>
          <p class="modal-desc" id="modalDesc"></p>
          <p class="modal-detail" id="modalDetail"></p>
          <div class="modal-tags" id="modalTags"></div>
          <a
            class="modal-cta"
            id="modalCta"
            href="#"
            target="_blank"
            rel="noopener"
            hidden
          ></a>
          <div class="modal-subs" id="modalSubs" hidden></div>
        </div>
      </div>
    </div>

    <script src="content.js"></script>
    <script>
      /* ═══════════════════════════════════════
         DATA
      ═══════════════════════════════════════ */
      const DATA = window.INDWAY_DATA;
      const RATES = DATA.rates;
      const I18N = DATA.i18n;

      let lang = "id";
      const t = (k) => (I18N[lang] || I18N.id || {})[k] || k;

      /* ═══════════════════════════════════════
         MODAL
      ═══════════════════════════════════════ */
      const modalEl = document.getElementById("modal");
      const modalClose = document.getElementById("modalClose");

      function openModal(item) {
        const STATUS = {
          active: "modal_status_active",
          wip: "modal_status_wip",
          archived: "modal_status_archived",
        };
        // media
        const mediaEl = document.getElementById("modalMedia");
        mediaEl.innerHTML = "";
        if (item.media?.src) {
          mediaEl.innerHTML =
            item.media.type === "video"
              ? `<video src="${item.media.src}" autoplay loop muted playsinline></video>`
              : `<img src="${item.media.src}" alt="${item.name}" loading="lazy">`;
          mediaEl.hidden = false;
        } else {
          mediaEl.hidden = true;
        }
        // meta
        document.getElementById("modalCategory").textContent =
          item.category || "";
        const statusEl = document.getElementById("modalStatus");
        statusEl.textContent = t(STATUS[item.status]) || item.status || "";
        statusEl.dataset.s = item.status || "";
        // text
        document.getElementById("modalName").textContent = item.name;
        document.getElementById("modalDesc").textContent =
          item.desc?.[lang] || item.desc?.id || "";
        document.getElementById("modalDetail").textContent =
          item.detail?.[lang] || item.detail?.id || "";
        // tags
        document.getElementById("modalTags").innerHTML = (item.tags || [])
          .map((tag) => `<span class="modal-tag">${tag}</span>`)
          .join("");
        // cta
        const ctaEl = document.getElementById("modalCta");
        if (item.url) {
          ctaEl.href = item.url;
          ctaEl.textContent = t("modal_visit");
          ctaEl.hidden = false;
        } else {
          ctaEl.hidden = true;
        }
        // sub-links
        const subsEl = document.getElementById("modalSubs");
        subsEl.innerHTML = "";
        if (item.subs?.length) {
          item.subs.forEach((s) => {
            const a = document.createElement("a");
            a.className = "sub-link";
            a.href = s.url;
            a.target = "_blank";
            a.innerHTML = `<span class="sub-link-name">${s.name}</span><span class="sub-link-desc">${s.desc?.[lang] || s.desc?.id || ""}</span>`;
            subsEl.appendChild(a);
          });
          subsEl.hidden = false;
        } else {
          subsEl.hidden = true;
        }
        modalEl.classList.add("open");
        document.body.style.overflow = "hidden";
        document.getElementById("modalScrollBody").scrollTop = 0;
      }

      function closeModal() {
        modalEl.classList.remove("open");
        document.body.style.overflow = "";
      }

      modalClose.addEventListener("click", closeModal);
      modalEl.addEventListener("click", (e) => {
        if (e.target === modalEl) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      /* ═══════════════════════════════════════
         SHOWCASE
      ═══════════════════════════════════════ */
      let activeSlot = null,
        showcaseTimer = null;

      function buildShowcaseSlots() {
        const panel = document.getElementById("showcase-panel");
        panel
          .querySelectorAll(".showcase-slot:not(.default)")
          .forEach((s) => s.remove());
        DATA.products.forEach((p, i) => {
          const slot = document.createElement("div");
          slot.className = "showcase-slot";
          slot.id = `slot-${i}`;
          if (p.media?.type === "video") {
            slot.innerHTML = `<video src="${p.media.src}" autoplay loop muted playsinline></video>`;
          } else if (p.media?.src) {
            slot.innerHTML = `<img src="${p.media.src}" alt="${p.name}" loading="lazy">`;
          }
          panel.appendChild(slot);
        });
      }

      function showSlot(i) {
        const def = document.getElementById("showcase-default");
        const slot = document.getElementById(`slot-${i}`);
        if (!slot) return;
        def.classList.remove("default");
        def.style.opacity = "0";
        if (activeSlot && activeSlot !== slot)
          activeSlot.classList.remove("active");
        slot.classList.add("active");
        activeSlot = slot;
      }

      function hideSlot() {
        if (activeSlot) {
          activeSlot.classList.remove("active");
          activeSlot = null;
        }
        const def = document.getElementById("showcase-default");
        def.style.opacity = "1";
      }

      /* ═══════════════════════════════════════
         BUILD
      ═══════════════════════════════════════ */
      function buildProductList() {
        const ul = document.getElementById("list-produk");
        if (!ul) return;
        ul.innerHTML = "";
        DATA.products.forEach((p, i) => {
          const li = document.createElement("li");
          const pn = document.createElement("span");
          pn.className = "pname";
          pn.textContent = p.name;
          const pd = document.createElement("span");
          pd.className = "pdesc";
          pd.innerHTML = p.desc[lang] || p.desc.id;
          li.appendChild(pn);
          li.appendChild(pd);
          li.addEventListener("mouseenter", () => {
            clearTimeout(showcaseTimer);
            showSlot(i);
          });
          li.addEventListener("mouseleave", () => {
            showcaseTimer = setTimeout(hideSlot, 300);
          });
          li.addEventListener("click", () => openModal(p));
          ul.appendChild(li);
        });
        buildShowcaseSlots();
        observe(ul, "li");
      }

      function buildItem(item) {
        const li = document.createElement("li");
        const pn = document.createElement("span");
        pn.className = "pname";
        pn.textContent = item.name;
        const pd = document.createElement("span");
        pd.className = "pdesc";
        pd.innerHTML = item.desc[lang] || item.desc.id;
        li.appendChild(pn);
        li.appendChild(pd);
        li.addEventListener("click", () => openModal(item));
        return li;
      }

      function buildList(id, items) {
        const ul = document.getElementById(id);
        if (!ul) return;
        ul.innerHTML = "";
        items.forEach((item) => ul.appendChild(buildItem(item)));
        observe(ul, "li");
      }

      function buildCards() {
        const g = document.getElementById("web-cards");
        if (!g) return;
        g.innerHTML = "";
        DATA.websites.forEach((site) => {
          const el = document.createElement("div");
          el.className = "card";
          el.setAttribute("role", "button");
          el.setAttribute("tabindex", "0");
          let subsHTML = "";
          if (site.subs?.length) {
            subsHTML = `<div class="card-subs">${site.subs
              .map(
                (s) =>
                  `<a class="sub-link" href="${s.url}" target="_blank" onclick="event.stopPropagation()">
                <span class="sub-link-name">${s.name}</span>
                <span class="sub-link-desc">${s.desc[lang] || s.desc.id}</span>
              </a>`,
              )
              .join("")}</div>`;
          }
          el.innerHTML = `<div class="card-name">${site.name}</div><div class="card-desc">${site.desc[lang] || site.desc.id}</div>${subsHTML}`;
          el.addEventListener("click", () => openModal(site));
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") openModal(site);
          });
          g.appendChild(el);
        });
        observe(g, ".card", "#desktop-links");
      }

      function buildSocials() {
        const w = document.getElementById("socials");
        if (!w) return;
        w.innerHTML = "";
        DATA.socials.forEach((s) => {
          const a = document.createElement("a");
          a.className = "social-pill";
          a.href = s.url;
          a.textContent = s.label;
          if (!s.url.startsWith("mailto")) a.target = "_blank";
          w.appendChild(a);
        });
        observe(w, ".social-pill", "#footer-note");
      }

      function buildRate() {
        const r = RATES[lang] || RATES.en;
        const el = document.getElementById("hero-rate");
        if (!el) return;
        el.innerHTML = `${t("rate_pre")} <span class="amount">${r.symbol}${r.amount}/${r.unit}</span> <span style="opacity:.6;font-size:.85em">${r.note}</span>`;
      }

      function buildAll() {
        buildProductList();
        buildList("list-side", DATA.side);
        buildList("list-themes", DATA.themes);
        buildList("list-cyber", DATA.cyber);
        buildCards();
        buildSocials();
        buildRate();
      }

      function applyI18n() {
        document.documentElement.lang = lang;
        document
          .querySelectorAll("[data-i18n]")
          .forEach((el) => (el.textContent = t(el.dataset.i18n)));
      }

      /* ═══════════════════════════════════════
         OBSERVE
      ═══════════════════════════════════════ */
      function observe(parent, childSel, extraSel = null) {
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (!e.isIntersecting) return;
              const kids = [...e.target.querySelectorAll(childSel)];
              kids.forEach((el, i) =>
                setTimeout(() => el.classList.add("in"), i * 65),
              );
              if (extraSel)
                setTimeout(
                  () => document.querySelector(extraSel)?.classList.add("in"),
                  kids.length * 65 + 120,
                );
              io.disconnect();
            });
          },
          { threshold: 0.04 },
        );
        io.observe(parent);
      }

      /* ═══════════════════════════════════════
         TOPBAR SCROLL
      ═══════════════════════════════════════ */
      const heroSec = document.getElementById("hero-section");
      const logoEl = document.getElementById("topbar-logo");
      const topbarEl = document.getElementById("topbar");
      new IntersectionObserver(
        ([e]) => {
          logoEl.classList.toggle("show", !e.isIntersecting);
          topbarEl.classList.toggle("scrolled", !e.isIntersecting);
        },
        { threshold: 0.1 },
      ).observe(heroSec);

      /* ═══════════════════════════════════════
         AUTO THEME
      ═══════════════════════════════════════ */
      let themeManualOverride = false;

      function getAutoTheme() {
        const hour = new Date().getHours();
        return hour >= 6 && hour < 18 ? "light" : "dark";
      }

      function applyTheme(mode, isAuto) {
        const isDark = mode === "dark";
        document.documentElement.setAttribute(
          "data-theme",
          isDark ? "dark" : "",
        );
        const btn = document.getElementById("themeBtn");
        btn.textContent = isDark ? "\uD83C\uDF19" : "\u2600";
        btn.title = isAuto
          ? `auto \u00B7 ${isDark ? "night" : "day"} mode`
          : isDark
            ? "night mode"
            : "day mode";
        document
          .getElementById("theme-meta")
          .setAttribute("content", isDark ? "#0c0c0c" : "#ffffff");
      }

      applyTheme(getAutoTheme(), true);
      setInterval(() => {
        if (!themeManualOverride) applyTheme(getAutoTheme(), true);
      }, 60000);
      document
        .getElementById("themeBtn")
        .addEventListener("click", function () {
          themeManualOverride = true;
          applyTheme(
            document.documentElement.getAttribute("data-theme") === "dark"
              ? "light"
              : "dark",
            false,
          );
        });

      /* ═══════════════════════════════════════
         AUTO LANG
      ═══════════════════════════════════════ */
      const TZ_LANG_MAP = [
        {
          match:
            /^Asia\/(Jakarta|Makassar|Jayapura|Pontianak|Balikpapan|Banjarmasin|Kupang|Ambon|Ternate|Sorong)$/i,
          lang: "id",
        },
        { match: /WIB|WITA|WIT|Indonesia/i, lang: "id" },
        {
          match: /^Asia\/(Kuala_Lumpur|Kuching|Brunei|Singapore)$/i,
          lang: "ms",
        },
        {
          match:
            /^Asia\/(Riyadh|Dubai|Kuwait|Bahrain|Qatar|Muscat|Aden|Baghdad|Beirut|Amman|Damascus|Jerusalem|Gaza)$/i,
          lang: "ar",
        },
        {
          match:
            /^Africa\/(Cairo|Tripoli|Khartoum|Algiers|Casablanca|Tunis|Ceuta)$/i,
          lang: "ar",
        },
      ];
      const LOCALE_LANG_MAP = {
        id: "id",
        in: "id",
        ms: "ms",
        zsm: "ms",
        ar: "ar",
        arb: "ar",
        en: "en",
      };

      function detectLang() {
        const navLang = (navigator.language || "")
          .toLowerCase()
          .replace("-", "_");
        const prefix = navLang.split("_")[0];
        if (LOCALE_LANG_MAP[navLang]) return LOCALE_LANG_MAP[navLang];
        if (LOCALE_LANG_MAP[prefix]) return LOCALE_LANG_MAP[prefix];
        try {
          const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "";
          for (const r of TZ_LANG_MAP) if (r.match.test(tz)) return r.lang;
        } catch (_) {}
        return "id";
      }

      function setLang(newLang, isAuto) {
        lang = newLang;
        document
          .querySelectorAll(".lang-opt")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.lang === lang),
          );
        const labels = { id: "ID", en: "EN", ms: "MY", ar: "AR" };
        document.getElementById("langLabel").textContent =
          labels[lang] || lang.toUpperCase();
        if (isAuto) document.documentElement.dataset.langAuto = lang;
        applyI18n();
        buildAll();
      }

      /* lang picker UI */
      const langPicker = document.getElementById("langPicker");
      const langCurrent = document.getElementById("langCurrent");
      langCurrent.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = langPicker.classList.toggle("open");
        langCurrent.setAttribute("aria-expanded", open);
      });
      document.querySelectorAll(".lang-opt").forEach((btn) => {
        btn.addEventListener("click", () => {
          setLang(btn.dataset.lang, false);
          langPicker.classList.remove("open");
          langCurrent.setAttribute("aria-expanded", "false");
        });
      });
      document.addEventListener("click", () => {
        langPicker.classList.remove("open");
        langCurrent.setAttribute("aria-expanded", "false");
      });

      /* ═══════════════════════════════════════
         INIT
      ═══════════════════════════════════════ */
      setLang(detectLang(), true);
    </script>
  </body>
</html>
