@media (max-width: 768px) {
  .plist li {
    display: flex;
    flex-direction: column;
    width: 100%;
    margin-bottom: 1rem; // adjust spacing as needed
  }
  .plist .pname,
  .plist .pdesc {
    width: 100%;
  }
  .section {
    padding: 60px 0;
  }
  .sub-link-desc {
    white-space: normal;
    line-height: 1.5;
  }
}
