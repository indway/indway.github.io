name: Auto-Generate Assets

on:
  push:
    branches:
      - main
    paths:
      - 'diary/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'scripts/content.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install || echo "No dependencies to install"

      - name: Run Generators
        run: npm run generate

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml llms.txt llms-full.txt feed.xml scripts/diary.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate sitemap, llms, rss, and diary [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
